<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="benGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d0f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="300" fill="#0a0a0f"/>
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="50" fill="url(#benGrad)" opacity="0.8"/>
    <ellipse cx="100" cy="200" rx="40" ry="60" fill="url(#benGrad)" opacity="0.6"/>
    <rect x="60" y="240" width="15" height="50" rx="5" fill="url(#benGrad)" opacity="0.7"/>
    <rect x="125" y="240" width="15" height="50" rx="5" fill="url(#benGrad)" opacity="0.7"/>
  </g>
  <text x="100" y="290" text-anchor="middle" fill="#00ff41" font-family="Arial" font-size="12">BEN 10</text>
</svg>
