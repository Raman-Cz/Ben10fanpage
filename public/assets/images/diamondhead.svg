<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cccc;stop-opacity:1" />
    </linearGradient>
    <filter id="diamondGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="300" fill="#001a1a"/>
  <g filter="url(#diamondGlow)">
    <polygon points="100,50 160,120 140,200 60,200 40,120" fill="url(#diamondGrad)" opacity="0.9"/>
    <polygon points="100,70 140,120 130,170 70,170 60,120" fill="#00ffee" opacity="0.7"/>
    <circle cx="80" cy="110" r="10" fill="#fff"/>
    <circle cx="120" cy="110" r="10" fill="#fff"/>
    <line x1="50" y1="180" x2="40" y2="250" stroke="#00ffcc" stroke-width="8"/>
    <line x1="150" y1="180" x2="160" y2="250" stroke="#00ffcc" stroke-width="8"/>
    <line x1="80" y1="200" x2="75" y2="270" stroke="#00ffcc" stroke-width="8"/>
    <line x1="120" y1="200" x2="125" y2="270" stroke="#00ffcc" stroke-width="8"/>
    <polygon points="30,100 50,130 30,160 10,130" fill="#00ffcc" opacity="0.6"/>
    <polygon points="170,100 190,130 170,160 150,130" fill="#00ffcc" opacity="0.6"/>
  </g>
  <text x="100" y="25" text-anchor="middle" fill="#00ffcc" font-family="Arial" font-weight="bold" font-size="12">DIAMONDHEAD</text>
</svg>
