<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6600cc;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#330066;stop-opacity:0.6" />
    </linearGradient>
    <filter id="ghostGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="300" fill="#0a001a"/>
  <g filter="url(#ghostGlow)">
    <path d="M50 100 Q100 50 150 100 L160 200 Q150 250 130 280 L100 260 L70 280 Q50 250 40 200 Z" fill="url(#ghostGrad)"/>
    <ellipse cx="80" cy="130" rx="15" ry="20" fill="#1a0033"/>
    <ellipse cx="120" cy="130" rx="15" ry="20" fill="#1a0033"/>
    <circle cx="80" cy="130" r="8" fill="#ff0066"/>
    <circle cx="120" cy="130" r="8" fill="#ff0066"/>
    <path d="M85 170 Q100 180 115 170" stroke="#ff00aa" stroke-width="3" fill="none"/>
    <path d="M30 120 Q20 150 30 180" stroke="#9900ff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M170 120 Q180 150 170 180" stroke="#9900ff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M40 200 Q30 220 40 240" stroke="#6600cc" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M160 200 Q170 220 160 240" stroke="#6600cc" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  <text x="100" y="25" text-anchor="middle" fill="#cc00ff" font-family="Arial" font-weight="bold" font-size="14">GHOSTFREAK</text>
</svg>
