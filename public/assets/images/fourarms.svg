<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="fourarmsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#660000;stop-opacity:1" />
    </linearGradient>
    <filter id="fourarmsGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="300" fill="#1a0000"/>
  <g filter="url(#fourarmsGlow)">
    <ellipse cx="100" cy="140" rx="70" ry="90" fill="url(#fourarmsGrad)"/>
    <rect x="30" y="100" width="25" height="80" rx="8" fill="url(#fourarmsGrad)"/>
    <rect x="145" y="100" width="25" height="80" rx="8" fill="url(#fourarmsGrad)"/>
    <rect x="50" y="200" width="30" height="70" rx="10" fill="url(#fourarmsGrad)"/>
    <rect x="120" y="200" width="30" height="70" rx="10" fill="url(#fourarmsGrad)"/>
    <circle cx="75" cy="110" r="12" fill="#fff"/>
    <circle cx="125" cy="110" r="12" fill="#fff"/>
    <rect x="65" y="160" width="70" height="15" rx="5" fill="#ff3333"/>
  </g>
  <text x="100" y="25" text-anchor="middle" fill="#ff4444" font-family="Arial" font-weight="bold" font-size="14">FOUR ARMS</text>
</svg>
