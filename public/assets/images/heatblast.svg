<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3300;stop-opacity:1" />
    </linearGradient>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="300" fill="#1a0500"/>
  <g filter="url(#fireGlow)">
    <ellipse cx="100" cy="150" rx="60" ry="80" fill="url(#fireGrad)" opacity="0.9"/>
    <ellipse cx="100" cy="120" rx="45" ry="50" fill="#ffcc00" opacity="0.8"/>
    <circle cx="80" cy="100" r="8" fill="#fff"/>
    <circle cx="120" cy="100" r="8" fill="#fff"/>
    <path d="M50 200 Q30 250 60 280 L80 250 Z" fill="url(#fireGrad)" opacity="0.7"/>
    <path d="M150 200 Q170 250 140 280 L120 250 Z" fill="url(#fireGrad)" opacity="0.7"/>
    <path d="M70 220 L60 280 L90 270 Z" fill="url(#fireGrad)" opacity="0.8"/>
    <path d="M130 220 L140 280 L110 270 Z" fill="url(#fireGrad)" opacity="0.8"/>
  </g>
  <text x="100" y="20" text-anchor="middle" fill="#ff6b00" font-family="Arial" font-weight="bold" font-size="14">HEATBLAST</text>
</svg>
